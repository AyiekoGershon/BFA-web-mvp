services:
  - type: web
    name: bfa-backend
    env: python
    region: oregon
    buildCommand: "pip install --only-binary :all: -r requirements.txt"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    runtime: python311
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend-domain.vercel.app,http://localhost:5173"
